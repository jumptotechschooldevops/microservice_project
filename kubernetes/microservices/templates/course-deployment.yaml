apiVersion: apps/v1
kind: Deployment

metadata:
  name: course-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: course-service

  template:
    metadata:
      labels:
        app: course-service

    spec:
      containers:
        - name: course-container
          image: 230026708124.dkr.ecr.us-east-2.amazonaws.com/course-service:v10

          ports:
            - containerPort: 3000

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DB_HOST

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DB_PASSWORD

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DB_NAME
