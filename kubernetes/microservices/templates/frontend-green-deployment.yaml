apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend-green

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend
      version: green

  template:
    metadata:
      labels:
        app: frontend
        version: green

    spec:
      containers:
      - name: frontend

        image: 230026708124.dkr.ecr.us-east-2.amazonaws.com/frontend-service:v2

        ports:
        - containerPort: 80
